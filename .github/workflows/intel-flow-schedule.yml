name: Intel Flow Schedule

on:
  workflow_dispatch:
  schedule:
    # Asia/Taipei 10:30 daily
    - cron: "30 10 * * 1-7"
      timezone: "Asia/Taipei"
    # Asia/Taipei 20:00 daily
    - cron: "00 20 * * 1-7"
      timezone: "Asia/Taipei"

permissions:
  contents: read

concurrency:
  group: intel-flow-schedule
  cancel-in-progress: false

jobs:
  run-intel-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      ENABLE_AI_ANALYSIS: "true"
      ENABLE_DISCORD_DELIVERY: "true"
      ENABLE_NOTION_DELIVERY: "true"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN_PAT || github.token }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      NOTION_INTEGRATION_SECRET: ${{ secrets.NOTION_INTEGRATION_SECRET }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      TWITTER_CONSUMER_KEY: ${{ secrets.TWITTER_CONSUMER_KEY }}
      TWITTER_CONSUMER_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run intel flow once
        run: python main.py --once --live-delivery
